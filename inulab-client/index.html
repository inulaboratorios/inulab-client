<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>INULABORATORIOS - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="root"></div>
    <script src="js/app.js"></script>
    <script src="js/keyboard-fix.js"></script>
    <!-- Update banner — controlado desde js/app.js (función inulabShowUpdateBanner) -->
    <div id="inulab-update-banner" style="display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:calc(16px + env(safe-area-inset-bottom, 0px));z-index:9999;background:linear-gradient(to right,#06b6d4,#2563eb);color:white;padding:10px 14px 10px 18px;border-radius:9999px;box-shadow:0 10px 25px -5px rgba(0,0,0,.3),0 8px 10px -6px rgba(0,0,0,.2);font:600 14px system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;align-items:center;gap:12px;max-width:calc(100vw - 32px);">
      <i class="fas fa-cloud-arrow-down" style="opacity:.95;font-size:16px;"></i>
      <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Nueva versión disponible</span>
      <button id="inulab-update-refresh" type="button" style="background:#fff;color:#0e7490;border:0;padding:6px 16px;border-radius:9999px;font:600 13px system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;cursor:pointer;flex-shrink:0;">Actualizar</button>
      <button id="inulab-update-dismiss" type="button" aria-label="Cerrar" style="background:transparent;border:0;color:#fff;opacity:.7;font-size:20px;line-height:1;cursor:pointer;padding:0 4px;flex-shrink:0;">×</button>
    </div>
</body>
</html>
